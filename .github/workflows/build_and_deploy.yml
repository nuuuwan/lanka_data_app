name: Build and deploy

on:
  push:

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - run: npm install
      - run: npm run build

      # Publish directly from this job. We intentionally avoid
      # actions/upload-artifact here because it rejects file paths containing
      # ":" (e.g. build/_output/.../LK:rivers/...), which are valid on the
      # Linux runner and on GitHub Pages.
      - uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.PAGES_TOKEN }}
          publish_dir: ./build
