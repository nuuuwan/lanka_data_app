<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Lanka Data</title>
    <!--
      GitHub Pages has no server-side routing, so refreshing a client-side
      route (e.g. /lanka_data_app/Presidential/2015/LK-11:pd/Map) returns this
      404 page. This script rewrites the URL into a query string and redirects
      to the app's index.html, which restores the real path (see the snippet in
      index.html). Based on https://github.com/rafgraph/spa-github-pages.

      pathSegmentsToKeep = 1 keeps the project-page base ("/lanka_data_app").
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
